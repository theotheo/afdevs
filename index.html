      <script>
        (function() {
          var bands = document.querySelectorAll('.band');
          var btn = document.getElementById('ticket-btn');
          var dur = 1500;
          var delay = 300;

          // Animate: clean → glitch on page load
          setTimeout(function() {
            bands.forEach(function(b) {
              var dx = Number(b.dataset.dx);
              b.style.transition = 'transform ' + (dur/1000) + 's cubic-bezier(0.25,0,0,1)';
              b.style.transform = 'translate(' + dx + 'px,0)';
            });
          }, delay);

          // Click: open Yandex Tickets via dealer API
          btn.addEventListener('click', function(e) {
            e.preventDefault();
            if (window.YandexTicketsDealer) {
              window.YandexTicketsDealer.push(['open', {
                sessionId: 'ticketsteam-7987@61936708'
              }]);
            }
          });

          // Hover: invert glitch
          btn.addEventListener('mouseenter', function() {
            bands.forEach(function(b) {
              var dx = Number(b.dataset.dx);
              b.style.transform = 'translate(' + (-dx) + 'px,0)';
            });
          });
          btn.addEventListener('mouseleave', function() {
            bands.forEach(function(b) {
              var dx = Number(b.dataset.dx);
              b.style.transform = 'translate(' + dx + 'px,0)';
            });
          });
        })();
      </script>

    <script>
      (function() {
        var cat = document.getElementById('cat');
        var scale = 1;
        var currentScale = 1;
        var minScale = 0.3;
        var maxScale = 2.5;
        var speed = 0.03;

        cat.style.willChange = 'transform';
        cat.style.transformOrigin = 'center bottom';

        // Wheel: scroll down → shrink, scroll up → grow
        window.addEventListener('wheel', function(e) {
          if (e.deltaY > 0) {
            scale = Math.max(minScale, scale - speed);
          } else {
            scale = Math.min(maxScale, scale + speed);
          }
        }, { passive: true });

        // Mobile: touch swipe
        var touchY = 0;
        window.addEventListener('touchstart', function(e) {
          touchY = e.touches[0].clientY;
        }, { passive: true });
        window.addEventListener('touchmove', function(e) {
          var dy = e.touches[0].clientY - touchY;
          touchY = e.touches[0].clientY;
          if (dy < 0) {
            scale = Math.max(minScale, scale - speed);
          } else if (dy > 0) {
            scale = Math.min(maxScale, scale + speed);
          }
        }, { passive: true });

        // Smooth lerp
        function tick() {
          currentScale += (scale - currentScale) * 0.08;
          cat.style.transform = 'scale(' + currentScale.toFixed(3) + ')';
          requestAnimationFrame(tick);
        }
        tick();
      })();
    </script>
