      <script>
        (function() {
          var bands = document.querySelectorAll('.band');
          var btn = document.getElementById('ticket-btn');
          var dur = 1500;
          var delay = 300;

          // Animate: clean → glitch on page load
          setTimeout(function() {
            bands.forEach(function(b) {
              var dx = Number(b.dataset.dx);
              b.style.transition = 'transform ' + (dur/1000) + 's cubic-bezier(0.25,0,0,1)';
              b.style.transform = 'translate(' + dx + 'px,0)';
            });
          }, delay);

          // Hover: invert glitch
          var hovered = false;
          var hoverDir = 1;
          var currentDir = 1;
          btn.addEventListener('mouseenter', function() { hovered = true; hoverDir = -1; });
          btn.addEventListener('mouseleave', function() { hovered = false; hoverDir = 1; });

          // Click: open Yandex Tickets
          btn.addEventListener('click', function(e) {
            e.preventDefault();
            window['YandexTicketsDealer'].push(['getDealer', function(dealer) {
              dealer.open({ id: '823350', type: 'event' });
            }]);
          });

          // Motion-reactive glitch
          var targetX = 0;
          var currentX = 0;
          var ready = false;

          setTimeout(function() { ready = true; }, dur + delay + 200);

          function updateBands() {
            if (!ready) { requestAnimationFrame(updateBands); return; }
            // Smooth lerp
            currentX += (targetX - currentX) * 0.015;
            currentDir += (hoverDir - currentDir) * 0.05;
            bands.forEach(function(b, i) {
              var baseDx = Number(b.dataset.dx);
              var wave = Math.sin(i * 0.5) * currentX * 0.5;
              b.style.transition = 'none';
              b.style.transform = 'translate(' + (baseDx * currentDir + wave).toFixed(1) + 'px,0)';
            });
            requestAnimationFrame(updateBands);
          }

          // Desktop: mouse
          document.addEventListener('mousemove', function(e) {
            targetX = (e.clientX / window.innerWidth - 0.5) * 10;
          });

          // Mobile: accelerometer
          function listenMotion() {
            window.addEventListener('devicemotion', function(e) {
              var acc = e.accelerationIncludingGravity;
              if (acc) targetX = (acc.x || 0) * 2;
            });
          }

          if (typeof DeviceMotionEvent !== 'undefined' && typeof DeviceMotionEvent.requestPermission === 'function') {
            document.addEventListener('click', function() {
              DeviceMotionEvent.requestPermission().then(function(s) {
                if (s === 'granted') listenMotion();
              });
            }, {once: true});
          } else {
            listenMotion();
          }

          updateBands();
        })();
      </script>

    <script>
      (function() {
        var cat = document.getElementById('cat');
        var ext = document.getElementById('cat-extend');
        var legH = 0;
        var currentH = 0;
        // Max growth = 30% of viewport height
        var maxH = window.innerHeight * 0.7;
        var speed = 3;

        // Wheel: scroll down → legs grow
        window.addEventListener('wheel', function(e) {
          if (e.deltaY > 0) {
            legH = Math.min(maxH, legH + speed);
          } else {
            legH = Math.max(0, legH - speed);
          }
        }, { passive: true });

        // Mobile: touch swipe
        var touchY = 0;
        window.addEventListener('touchstart', function(e) {
          touchY = e.touches[0].clientY;
        }, { passive: true });
        window.addEventListener('touchmove', function(e) {
          var dy = e.touches[0].clientY - touchY;
          touchY = e.touches[0].clientY;
          if (dy > 0) {
            legH = Math.min(maxH, legH + speed);
          } else if (dy < 0) {
            legH = Math.max(0, legH - speed);
          }
        }, { passive: true });

        // Extra cats — appear one by one
        var extras = document.querySelectorAll('.extra-cat');
        var extraCurrentH = [];
        extras.forEach(function() { extraCurrentH.push(0); });

        // Smooth lerp
        function tick() {
          currentH += (legH - currentH) * 0.08;
          ext.style.height = currentH.toFixed(1) + 'px';
          // Red tint as legs grow
          var pct = currentH / maxH;
          cat.style.filter = 'invert(' + pct.toFixed(2) + ') sepia(' + pct.toFixed(2) + ') saturate(' + (pct * 50).toFixed(0) + ') hue-rotate(330deg)';

          // Extra cats — appear one by one based on threshold
          extras.forEach(function(el, i) {
            var spd = Number(el.dataset.speed);
            var threshold = Number(el.dataset.threshold);
            // Only start growing after main cat passes threshold
            var targetH = Math.max(0, (currentH - threshold) * spd);
            extraCurrentH[i] += (targetH - extraCurrentH[i]) * 0.06;
            var h = extraCurrentH[i];
            if (h > 2) {
              el.style.bottom = '5vh';
              el.querySelector('.cat-extend').style.height = h.toFixed(1) + 'px';
              var epct = h / (maxH * spd);
              el.style.filter = 'invert(' + (epct*0.7).toFixed(2) + ') sepia(' + (epct*0.7).toFixed(2) + ') saturate(' + (epct * 40).toFixed(0) + ') hue-rotate(330deg)';
            } else {
              el.style.bottom = '-100%';
            }
          });

          requestAnimationFrame(tick);
        }
        tick();
      })();
    </script>
